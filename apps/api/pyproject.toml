[tool.black]
line-length = 100
target-version = ["py312"]

[tool.isort]
profile = "black"
line_length = 100
known_first_party = ["accounts", "config", "health"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "DJ", "S", "N", "C4", "SIM"]
ignore = ["S101", "DJ001"]

[tool.ruff.lint.per-file-ignores]
"**/tests.py" = ["S"]
"**/test_*.py" = ["S"]
"**/migrations/*.py" = ["E501"]
# Seeders / outils CLI : random non-crypto, mot de passe démo, best-effort try/except.
"**/management/commands/*.py" = ["S105", "S311", "S110", "SIM105"]

[tool.mypy]
python_version = "3.12"
plugins = ["mypy_django_plugin.main"]
strict = true
exclude = ["migrations/"]

[tool.django-stubs]
django_settings_module = "config.settings.dev"
