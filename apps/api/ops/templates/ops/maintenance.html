<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Neyla TV — Maintenance</title>
  <style>
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #0b0b0f; color: #e7e9ee;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
    }
    .card { max-width: 480px; padding: 36px 28px; text-align: center; }
    .logo {
      width: 56px; height: 56px; margin: 0 auto 18px; border-radius: 14px;
      background: linear-gradient(135deg, #5D1C6A, #FFC81E);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 800; color: #1a1400;
    }
    h1 { font-size: 22px; margin: 0 0 8px; }
    p { color: #9aa3b2; line-height: 1.5; margin: 6px 0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">N</div>
    <h1>Neyla TV — Maintenance</h1>
    <p>{{ message }}</p>
    <p style="font-size:13px;opacity:0.7">Merci de réessayer dans quelques instants.</p>
  </div>
</body>
</html>
