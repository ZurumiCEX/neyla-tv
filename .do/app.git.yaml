# DigitalOcean App Platform — variante "source git publique".
#
# À utiliser quand l'intégration GitHub de DO ne peut pas lire le repo.
# Prérequis : le repo doit être PUBLIC le temps du déploiement (App Platform
# clone l'URL publique, sans l'app GitHub). Voir le runbook §"Repo public".
#
# Déploiement :
#   doctl apps create --spec .do/app.git.yaml
#   doctl apps update <APP_ID> --spec .do/app.git.yaml
#
# Limite : la source `git:` ne supporte pas l'auto-deploy sur push. Pour
# redéployer après un commit : `doctl apps create-deployment <APP_ID>`.
# Pour de l'auto-deploy, repasser à `.do/app.yaml` (source GitHub) une fois
# l'accès GitHub résolu.

name: neyla-tv
region: fra

databases:
  - name: db
    engine: PG
    version: "16"
    production: false
  - name: redis
    engine: REDIS
    version: "7"
    production: true

envs:
  - key: DJANGO_SETTINGS_MODULE
    value: config.settings.prod
    scope: RUN_AND_BUILD_TIME
  - key: DJANGO_DEBUG
    value: "0"
    scope: RUN_TIME
  - key: DJANGO_SECRET_KEY
    value: REPLACE_ME_WITH_A_50_CHAR_RANDOM_SECRET
    type: SECRET
    scope: RUN_TIME
  - key: DJANGO_ALLOWED_HOSTS
    value: ${APP_DOMAIN},.ondigitalocean.app
    scope: RUN_TIME
  - key: DJANGO_CSRF_TRUSTED_ORIGINS
    value: ${APP_URL}
    scope: RUN_TIME
  - key: DJANGO_CORS_ALLOWED_ORIGINS
    value: ${APP_URL}
    scope: RUN_TIME
  - key: POSTGRES_DB
    value: ${db.DATABASE}
    scope: RUN_TIME
  - key: POSTGRES_USER
    value: ${db.USERNAME}
    scope: RUN_TIME
  - key: POSTGRES_PASSWORD
    value: ${db.PASSWORD}
    scope: RUN_TIME
  - key: POSTGRES_HOST
    value: ${db.HOSTNAME}
    scope: RUN_TIME
  - key: POSTGRES_PORT
    value: ${db.PORT}
    scope: RUN_TIME
  - key: POSTGRES_SSLMODE
    value: require
    scope: RUN_TIME
  - key: REDIS_URL
    value: ${redis.DATABASE_URL}
    scope: RUN_TIME
  - key: CELERY_BROKER_URL
    value: ${redis.DATABASE_URL}
    scope: RUN_TIME
  - key: CELERY_RESULT_BACKEND
    value: ${redis.DATABASE_URL}
    scope: RUN_TIME
  - key: FRONTEND_URL
    value: ${APP_URL}
    scope: RUN_TIME
  - key: DJANGO_DEFAULT_FROM_EMAIL
    value: no-reply@neyla.tv
    scope: RUN_TIME
  - key: DJANGO_EMAIL_BACKEND
    value: django.core.mail.backends.console.EmailBackend
    scope: RUN_TIME
  - key: CLOUDFLARE_ACCOUNT_ID
    value: ""
    scope: RUN_TIME
  - key: CLOUDFLARE_API_TOKEN
    value: ""
    scope: RUN_TIME
  - key: CLOUDFLARE_WEBHOOK_SECRET
    value: change-me-webhook-secret
    type: SECRET
    scope: RUN_TIME
  - key: SENTRY_DSN
    value: ""
    scope: RUN_TIME

services:
  - name: api
    dockerfile_path: infra/docker/api.Dockerfile
    source_dir: /
    git:
      repo_clone_url: https://github.com/ZurumiCEX/neyla-tv.git
      branch: main
    http_port: 8000
    instance_size_slug: apps-s-1vcpu-1gb
    instance_count: 1
    health_check:
      http_path: /api/healthz
      initial_delay_seconds: 40
      period_seconds: 15
      failure_threshold: 5
    routes:
      - path: /api
      - path: /admin
      - path: /ws
      - path: /django-static

  - name: web
    dockerfile_path: infra/docker/web.Dockerfile
    source_dir: /
    git:
      repo_clone_url: https://github.com/ZurumiCEX/neyla-tv.git
      branch: main
    http_port: 3000
    instance_size_slug: apps-s-1vcpu-1gb
    instance_count: 1
    routes:
      - path: /
    envs:
      - key: NEXT_PUBLIC_API_URL
        value: ${APP_URL}
        scope: RUN_AND_BUILD_TIME
      - key: API_URL_INTERNAL
        value: ${APP_URL}
        scope: RUN_TIME

workers:
  - name: worker
    dockerfile_path: infra/docker/api.Dockerfile
    source_dir: /
    git:
      repo_clone_url: https://github.com/ZurumiCEX/neyla-tv.git
      branch: main
    run_command: celery -A config worker -l info
    instance_size_slug: apps-s-1vcpu-0.5gb
    instance_count: 1
  - name: beat
    dockerfile_path: infra/docker/api.Dockerfile
    source_dir: /
    git:
      repo_clone_url: https://github.com/ZurumiCEX/neyla-tv.git
      branch: main
    run_command: celery -A config beat -l info
    instance_size_slug: apps-s-1vcpu-0.5gb
    instance_count: 1

jobs:
  - name: migrate
    kind: PRE_DEPLOY
    dockerfile_path: infra/docker/api.Dockerfile
    source_dir: /
    git:
      repo_clone_url: https://github.com/ZurumiCEX/neyla-tv.git
      branch: main
    run_command: python manage.py migrate --noinput
    instance_size_slug: apps-s-1vcpu-0.5gb
