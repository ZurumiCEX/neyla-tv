name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    name: API (lint + tests)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: neyla
          POSTGRES_USER: neyla
          POSTGRES_PASSWORD: neyla
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U neyla"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DJANGO_SECRET_KEY: ci-secret
      DJANGO_DEBUG: "1"
      POSTGRES_DB: neyla
      POSTGRES_USER: neyla
      POSTGRES_PASSWORD: neyla
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements/dev.txt

      - name: Install
        working-directory: apps/api
        run: pip install -r requirements/dev.txt

      - name: Ruff
        working-directory: apps/api
        run: ruff check .

      - name: Black
        working-directory: apps/api
        run: black --check .

      - name: Pytest
        working-directory: apps/api
        run: pytest

  web:
    name: Web (lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install
        working-directory: apps/web
        run: npm install --no-audit --no-fund

      - name: Lint
        working-directory: apps/web
        run: npm run lint

      - name: Typecheck
        working-directory: apps/web
        run: npm run typecheck

      - name: Build
        working-directory: apps/web
        env:
          API_URL_INTERNAL: http://localhost:8000
        run: npm run build
