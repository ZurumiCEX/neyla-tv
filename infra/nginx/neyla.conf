# Reverse proxy unique pour Neyla TV.
# Cloudflare termine le TLS et nous parle en HTTP simple.
# /api/, /admin/, /ws/ → backend Django/Daphne
# tout le reste     → frontend Next.js
upstream neyla_api {
    server api:8000;
}

upstream neyla_web {
    server web:3000;
}

# On masque la query string sur /ws/ pour ne pas logger les JWT en query param
# (cf. ADR 005 §JWT en query param).
map $request_uri $request_uri_safe {
    "~^/ws/"  /ws/[redacted];
    default   $request_uri;
}

log_format clean '$remote_addr - [$time_local] "$request_method $request_uri_safe '
                 '$server_protocol" $status $body_bytes_sent "$http_referer" "$http_user_agent"';

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 5m;
    server_tokens off;

    access_log /var/log/nginx/access.log clean;

    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Healthcheck léger pour le LB Cloudflare.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # WebSocket : on désactive le buffering et on prolonge le timeout.
    location /ws/ {
        proxy_pass http://neyla_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        proxy_buffering off;
    }

    # API REST + admin Django.
    location /api/ {
        proxy_pass http://neyla_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location /admin/ {
        proxy_pass http://neyla_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location /static/ {
        proxy_pass http://neyla_api;
        proxy_set_header Host $host;
        expires 1d;
    }

    # Tout le reste → Next.js.
    location / {
        proxy_pass http://neyla_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}
