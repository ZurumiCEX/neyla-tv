name: neyla-prod

# Production compose : tout sur un Droplet, derrière nginx + Cloudflare.
# - Pas de ports DB / Redis exposés au host (uniquement réseau interne).
# - nginx unique entry point (port 80, TLS terminé par Cloudflare).
# - Backup Postgres quotidien vers DO Spaces via cron.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
      target: prod
    env_file: ../../.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 --access-log - config.asgi:application"

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
      target: prod
    env_file: ../../.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: celery -A config worker -l info

  beat:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
      target: prod
    env_file: ../../.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A config beat -l info

  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
      target: prod
    env_file: ../../.env
    restart: unless-stopped
    depends_on:
      - api

  nginx:
    build:
      context: ../..
      dockerfile: infra/docker/nginx.Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
      - web

  backup:
    build:
      context: ../..
      dockerfile: infra/docker/backup.Dockerfile
    env_file: ../../.env
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
